<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1a063b" />
    <meta
      name="description"
      content="StudyQuest - Gamified learning app for HK students"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    
    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Google Fonts: Press Start 2P, Space Grotesk, Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Press+Start+2P&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Material Symbols Outlined -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    
    <title>StudyQuest - Hero's Hub</title>
    
    <style>
      /* Font loading optimization */
      .font-loading {
        opacity: 0;
      }
      .font-loaded {
        opacity: 1;
        transition: opacity 0.3s;
      }
      
      /* Material Symbols base styles - ensure icons render correctly */
      .material-symbols-outlined {
        font-family: 'Material Symbols Outlined';
        font-weight: normal;
        font-style: normal;
        font-size: 24px;
        line-height: 1;
        letter-spacing: normal;
        text-transform: none;
        display: inline-block;
        white-space: nowrap;
        word-wrap: normal;
        direction: ltr;
        -webkit-font-feature-settings: 'liga';
        -webkit-font-smoothing: antialiased;
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      
      /* Pixel font fallback */
      .font-pixel, [class*="font-['Press_Start_2P']"] {
        font-family: 'Press Start 2P', cursive, monospace;
        -webkit-font-smoothing: none;
        -moz-osx-font-smoothing: unset;
      }
      
      /* Headline font */
      .font-headline, [class*="font-headline"] {
        font-family: 'Space Grotesk', sans-serif;
      }
      
      /* Body font */
      .font-body, [class*="font-body"] {
        font-family: 'Inter', sans-serif;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
